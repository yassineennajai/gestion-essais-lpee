<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Agent IA Entreprise</title>

    <!-- ===== CSS هنا ===== -->
    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg,#1f2937,#111827);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .chat-container{
            width:520px;
            background:white;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,0.4);
            display:flex;
            flex-direction:column;
            overflow:hidden;
        }

        .header{
            background:#111827;
            color:white;
            padding:15px;
            text-align:center;
            font-size:20px;
            font-weight:bold;
        }

        #messages{
            flex:1;
            padding:15px;
            overflow-y:auto;
            background:#f9fafb;
        }

        .msg{
            margin:8px 0;
            padding:10px 14px;
            border-radius:12px;
            max-width:80%;
            word-wrap:break-word;
        }

        .user{
            background:#2563eb;
            color:white;
            margin-left:auto;
        }

        .bot{
            background:#e5e7eb;
            color:black;
            margin-right:auto;
        }

        .input-area{
            display:flex;
            border-top:1px solid #ddd;
        }

        input{
            flex:1;
            padding:12px;
            border:none;
            font-size:14px;
            outline:none;
        }

        button{
            background:#2563eb;
            color:white;
            border:none;
            padding:0 20px;
            cursor:pointer;
            font-weight:bold;
        }

        button:hover{
            background:#1e40af;
        }

    </style>
</head>


<body>

<div class="chat-container">

    <div class="header">
        🤖 Agent IA Entreprise (Bedrock + Claude)
    </div>

    <div id="messages"></div>

    <div class="input-area">
        <input id="msg" placeholder="اكتب سؤالك هنا..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>


<!-- ===== JS هنا ===== -->
<script>

async function sendMessage(){

    let input = document.getElementById("msg");
    let message = input.value.trim();

    if(!message) return;

    let box = document.getElementById("messages");

    // عرض رسالة المستخدم
    box.innerHTML += `<div class="msg user">👤 ${message}</div>`;

    input.value = "";

    // طلب للـ Flask
    let res = await fetch("/chat", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({message: message})
    });

    let data = await res.json();

    // عرض رد البوت
    box.innerHTML += `<div class="msg bot">🤖 ${data.reply}</div>`;

    box.scrollTop = box.scrollHeight;
}

</script>

</body>
</html>
