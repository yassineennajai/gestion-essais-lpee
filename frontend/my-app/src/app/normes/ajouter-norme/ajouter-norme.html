<div class="container-fluid py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-10">
      <div class="card border-0 shadow-sm rounded-4 overflow-hidden">

        <div class="card-header bg-white border-bottom border-light py-4 px-4 d-flex align-items-center justify-content-between">
          <div class="d-flex align-items-center gap-3">
            <div class="p-3 rounded-3 bg-primary-light text-primary" style="background-color: #f0f4ff;">
              <i class="bi bi-journal-bookmark-fill fs-4"></i>
            </div>
            <div>
              <h4 class="m-0 fw-bold text-dark">Ajouter une nouvelle Norme</h4>
              <p class="text-muted small m-0">Créez une norme et ses parties associées</p>
            </div>
          </div>
          <button (click)="cancel()" class="btn btn-light btn-sm rounded-pill px-3 border">
            <i class="bi bi-arrow-left me-1"></i> Retour
          </button>
        </div>

        <div class="card-body p-4 px-md-5">
          <form [formGroup]="normeForm" (ngSubmit)="save()" novalidate>

            <div class="row g-4 mb-5">
              <div class="col-12">
                <label class="form-label fw-semibold text-secondary">Libellé de la norme <span class="text-danger">*</span></label>
                <input
                  type="text"
                  class="form-control form-control-lg fs-6"
                  [ngClass]="{ 'is-invalid': isSubmitted && normeForm.get('libelle')?.invalid }"
                  formControlName="libelle"
                  placeholder="Ex: NF EN 933-1">
                <div class="invalid-feedback">Le libellé de la norme est obligatoire.</div>
              </div>
            </div>

            <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-4">
              <h5 class="fw-bold text-dark m-0 d-flex align-items-center gap-2">
                <i class="bi bi-list-nested text-primary"></i> Les Parties de la Norme
              </h5>
              <button type="button" (click)="ajouterPartie()" class="btn btn-outline-primary btn-sm rounded-pill px-3 fw-medium">
                <i class="bi bi-plus me-1"></i> Ajouter une partie
              </button>
            </div>

            <div formArrayName="parties">
              <div *ngFor="let partieForm of parties.controls; let i = index" [formGroupName]="i" class="row g-3 p-3 mb-3 bg-light rounded-3 align-items-end border position-relative">

                <span class="position-absolute top-0 start-0 translate-middle badge rounded-pill bg-secondary text-white ms-4" style="z-index: 1;">
                  #{{ i + 1 }}
                </span>

                <div class="col-12 col-md-3">
                  <label class="form-label small fw-semibold text-secondary">N° de la Partie <span class="text-danger">*</span></label>
                  <input
                    type="text"
                    class="form-control"
                    [ngClass]="{ 'is-invalid': isSubmitted && partieForm.get('no_partie')?.invalid }"
                    formControlName="no_partie"
                    placeholder="Ex: Partie 1">
                </div>

                <div class="col-12 col-md-8">
                  <label class="form-label small fw-semibold text-secondary">Titre de la Partie <span class="text-danger">*</span></label>
                  <input
                    type="text"
                    class="form-control"
                    [ngClass]="{ 'is-invalid': isSubmitted && partieForm.get('titre')?.invalid }"
                    formControlName="titre"
                    placeholder="Ex: Détermination de la granularité">
                </div>

                <div class="col-12 col-md-1 text-end">
                  <button type="button" (click)="supprimerPartie(i)" class="btn btn-outline-danger w-100 border-0 p-2" title="Supprimer cette partie">
                    <i class="bi bi-trash3 fs-5 d-flex justify-content-center"></i>
                  </button>
                </div>

              </div>
            </div>

            <div class="d-flex justify-content-end gap-3 mt-5 pt-3 border-top">
              <button type="button" (click)="cancel()" class="btn btn-light btn-lg rounded-pill px-4 border text-secondary fs-6">
                Annuler
              </button>
              <button type="submit" class="btn btn-primary btn-lg rounded-pill px-4 fw-semibold text-white fs-6 shadow-sm">
                <i class="bi bi-check-circle-fill me-2"></i> Enregistrer la Norme
              </button>
            </div>

          </form>
        </div>

      </div>
    </div>
  </div>
</div>
