<div class="container-fluid py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-10">
      <div class="card border-0 shadow-sm rounded-4 overflow-hidden">

        <div class="card-header bg-white border-bottom border-light py-4 px-4 d-flex align-items-center justify-content-between">
          <div class="d-flex align-items-center gap-3">
            <div class="p-3 rounded-3" style="background-color: #e6f7ed; color: #10b981;">
              <i class="bi bi-diagram-3-fill fs-4"></i>
            </div>
            <div>
              <h4 class="m-0 fw-bold text-dark">Ajouter une Famille d'Essais</h4>
              <p class="text-muted small m-0">Configurez une famille et ses sous-familles</p>
            </div>
          </div>
          <button type="button" (click)="cancel()" class="btn btn-light btn-sm rounded-pill px-3 border">
            <i class="bi bi-arrow-left me-1"></i> Retour
          </button>
        </div>

        <div class="card-body p-4 px-md-5">
          <form [formGroup]="familleForm" (ngSubmit)="save()" novalidate>

            <div class="row g-4 mb-5">
              <div class="col-12">
                <label class="form-label fw-semibold text-secondary">Nom de la Famille <span class="text-danger">*</span></label>
                <input
                  type="text"
                  class="form-control form-control-lg fs-6"
                  [ngClass]="{ 'is-invalid': isSubmitted && familleForm.get('nom_famille')?.invalid }"
                  formControlName="nom_famille"
                  placeholder="Ex: Granulats">
                <div class="invalid-feedback">Le nom de la famille est obligatoire.</div>
              </div>
            </div>

            <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-4">
              <h5 class="fw-bold text-dark m-0 d-flex align-items-center gap-2">
                <i class="bi bi-tags-fill text-success"></i> Les Sous-Familles
              </h5>
              <button type="button" (click)="ajouterSousFamille()" class="btn btn-outline-success btn-sm rounded-pill px-3 fw-medium">
                <i class="bi bi-plus me-1"></i> Ajouter une sous-famille
              </button>
            </div>

            <div formArrayName="sousFamilles">
              <div *ngFor="let sfForm of sousFamilles.controls; let i = index" [formGroupName]="i" class="row g-3 p-3 mb-3 bg-light rounded-3 align-items-end border position-relative">

                <span class="position-absolute top-0 start-0 translate-middle badge rounded-pill bg-success text-white ms-4" style="z-index: 1;">
                  Sous-famille #{{ i + 1 }}
                </span>

                <div class="col-12 col-md-11">
                  <label class="form-label small fw-semibold text-secondary">Nom de la Sous-Famille <span class="text-danger">*</span></label>
                  <input
                    type="text"
                    class="form-control"
                    [ngClass]="{ 'is-invalid': isSubmitted && sousFamilles.at(i).get('libelle')?.invalid }"
                    formControlName="libelle"
                    placeholder="Ex: Essais Physiques">
                  <div class="invalid-feedback">Le nom de la sous-famille est obligatoire.</div>
                </div>

                <div class="col-12 col-md-1 text-end">
                  <button type="button" (click)="supprimerSousFamille(i)" class="btn btn-outline-danger w-100 border-0 p-2" title="Supprimer">
                    <i class="bi bi-trash3 fs-5 d-flex justify-content-center"></i>
                  </button>
                </div>

              </div>
            </div>

            <div class="d-flex justify-content-end gap-3 mt-5 pt-3 border-top">
              <button type="button" (click)="cancel()" class="btn btn-light btn-lg rounded-pill px-4 border text-secondary fs-6">
                Annuler
              </button>
              <button type="submit" class="btn btn-success btn-lg rounded-pill px-4 fw-semibold text-white fs-6 shadow-sm">
                <i class="bi bi-check-circle-fill me-2"></i> Enregistrer la Famille
              </button>
            </div>

          </form>
        </div>

      </div>
    </div>
  </div>
</div>
